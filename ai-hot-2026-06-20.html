<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Rainford 的早报｜2026-06-20</title>
  <meta name="description" content="Rainford 的早报：黑色 Apple 风格移动端新闻博客。">
  <meta name="theme-color" content="#000000">
  <style>
    :root {
      color-scheme: dark;
      --ios-background-primary: #000000;
      --ios-background-secondary: #1c1c1e;
      --ios-background-tertiary: #2c2c2e;
      --ios-surface-elevated: #1c1c1e;
      --ios-fill-quaternary: rgba(118, 118, 128, .18);
      --ios-fill-tertiary: rgba(118, 118, 128, .24);
      --ios-label-primary: #ffffff;
      --ios-label-secondary: rgba(235, 235, 245, .60);
      --ios-label-tertiary: rgba(235, 235, 245, .30);
      --ios-hairline: rgba(255, 255, 255, .12);
      --ios-toolbar-glass-fill: rgba(255, 255, 255, .07);
      --ios-toolbar-glass-stroke: rgba(255, 255, 255, .30);
      --ink: var(--ios-label-primary);
      --muted: var(--ios-label-secondary);
      --muted-2: var(--ios-label-tertiary);
      --blue: #0a84ff;
      --red: #ff375f;
      --green: #32d74b;
      --orange: #ff9f0a;
      --cover-panel-rgb: 24, 28, 44;
      --cover-panel-soft-rgb: 43, 49, 70;
      --hero-play: rgba(245, 246, 255, .82);
      --radius-sheet: 34px;
      --radius-group: 24px;
      --radius-control: 999px;
      --control-size: 44px;
      --page-max: 390px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html {
      background: var(--ios-background-primary);
      scroll-behavior: smooth;
    }
    body {
      min-width: 320px;
      margin: 0;
      background: var(--ios-background-primary);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      line-height: 1.55;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; }
    button { font: inherit; }
    .page {
      width: min(var(--page-max), 100%);
      margin: 0 auto;
      padding: calc(18px + env(safe-area-inset-top, 0px)) 20px calc(34px + var(--safe-bottom));
      transform-origin: top center;
      transition: transform .26s ease, filter .26s ease, opacity .26s ease, padding-bottom .24s ease;
    }
    body.player-visible .page {
      padding-bottom: calc(120px + var(--safe-bottom));
    }
    body.modal-open .page {
      transform: scale(.97) translateY(-8px);
      filter: blur(2px) saturate(.92);
      opacity: .76;
    }
    .app-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .brand {
      min-width: 0;
    }
    .brand-mark {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.1;
    }
    .brand-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
    }
    .cover-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-group);
      background: var(--ios-fill-quaternary);
      border: .5px solid var(--ios-hairline);
      box-shadow: none;
      -webkit-backdrop-filter: blur(22px) saturate(1.16);
      backdrop-filter: blur(22px) saturate(1.16);
    }
    .cover-card::before,
    .news-card::before,
    .modal-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 18%);
      opacity: .28;
    }
    .cover-media {
      position: relative;
      z-index: 1;
      height: 244px;
      overflow: hidden;
      background: var(--ios-background-secondary);
    }
    .cover-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cover-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 52%, rgba(0,0,0,.28));
      pointer-events: none;
    }
    .cover-info {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--control-size);
      gap: 14px;
      align-items: center;
      min-height: 112px;
      padding: 16px 18px;
      background:
        linear-gradient(180deg, rgba(var(--cover-panel-soft-rgb), .88), rgba(var(--cover-panel-rgb), .96)),
        rgba(255,255,255,.06);
      border-top: .5px solid rgba(255,255,255,.10);
      -webkit-backdrop-filter: blur(20px) saturate(1.18);
      backdrop-filter: blur(20px) saturate(1.18);
    }
    .cover-title {
      margin: 0;
      color: #fff;
      font-size: 19px;
      line-height: 1.16;
      font-weight: 700;
    }
    .cover-time {
      margin: 6px 0 0;
      color: rgba(235, 235, 245, .66);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 600;
    }
    .play-button {
      width: var(--control-size);
      height: var(--control-size);
      border: .75px solid rgba(255,255,255,.32);
      border-radius: 50%;
      background:
        linear-gradient(180deg, rgba(255,255,255,.88), rgba(235,235,245,.72)),
        rgba(255,255,255,.58);
      color: rgb(var(--cover-panel-rgb));
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: none;
      -webkit-backdrop-filter: blur(22px) saturate(1.25);
      backdrop-filter: blur(22px) saturate(1.25);
    }
    .play-button::before {
      content: "";
      width: 0;
      height: 0;
      margin-left: 3px;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 12px solid currentColor;
    }
    .play-button.playing::before {
      width: 15px;
      height: 16px;
      margin-left: 0;
      border: 0;
      background: linear-gradient(90deg, currentColor 0 35%, transparent 35% 65%, currentColor 65% 100%);
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 28px 0 12px;
    }
    .section-title h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.12;
      letter-spacing: 0;
      font-weight: 700;
    }
    .category-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: -2px 0 14px;
      padding: 0 1px 2px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .category-bar::-webkit-scrollbar { display: none; }
    .category-bar span {
      flex: 0 0 auto;
      color: rgba(245,245,247,.82);
      background: var(--ios-toolbar-glass-fill);
      border: .75px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 650;
      line-height: 1;
      white-space: nowrap;
      -webkit-backdrop-filter: blur(18px) saturate(1.22);
      backdrop-filter: blur(18px) saturate(1.22);
    }
    .hidden-audio {
      display: none;
    }
    .mini-player {
      position: fixed;
      left: 50%;
      bottom: calc(12px + var(--safe-bottom));
      z-index: 18;
      width: min(calc(var(--page-max) - 28px), calc(100vw - 28px));
      min-height: 72px;
      overflow: hidden;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06)),
        rgba(34,34,38,.64);
      border: .5px solid rgba(255,255,255,.16);
      color: var(--ios-label-primary);
      box-shadow: 0 18px 46px rgba(0,0,0,.34);
      -webkit-backdrop-filter: blur(28px) saturate(1.28);
      backdrop-filter: blur(28px) saturate(1.28);
      transform: translate(-50%, 18px) scale(.98);
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
    }
    body.player-visible .mini-player {
      transform: translate(-50%, 0) scale(1);
      opacity: 1;
      pointer-events: auto;
    }
    body.modal-open .mini-player {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 18px) scale(.98);
    }
    .mini-player-main {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 44px;
      align-items: center;
      gap: 12px;
      min-height: 68px;
      padding: 10px 12px 14px;
    }
    .mini-art {
      width: 48px;
      height: 48px;
      overflow: hidden;
      border-radius: 13px;
      background: rgba(255,255,255,.10);
      border: .5px solid rgba(255,255,255,.12);
    }
    .mini-art img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .mini-copy {
      min-width: 0;
    }
    .mini-title {
      display: block;
      overflow: hidden;
      color: #fff;
      font-size: 15px;
      line-height: 1.18;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-meta {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      color: rgba(235,235,245,.62);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 560;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-toggle {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #050505;
      background: rgba(255,255,255,.92);
      cursor: pointer;
      box-shadow: none;
    }
    .mini-toggle:focus {
      outline: none;
    }
    .mini-toggle:focus-visible {
      box-shadow: 0 0 0 2px rgba(255,255,255,.22);
    }
    .mini-toggle::before {
      content: "";
      width: 0;
      height: 0;
      margin-left: 3px;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 12px solid currentColor;
    }
    .mini-toggle.playing::before {
      width: 14px;
      height: 16px;
      margin-left: 0;
      border: 0;
      background: linear-gradient(90deg, currentColor 0 36%, transparent 36% 64%, currentColor 64% 100%);
    }
    .mini-progress {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 8px;
      height: 3px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(235,235,245,.22);
    }
    .mini-progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255,255,255,.82);
      transition: width .16s linear;
    }
    .news-list {
      display: grid;
      gap: 12px;
    }
    .news-card {
      position: relative;
      display: block;
      width: 100%;
      min-height: 96px;
      padding: 15px 16px;
      overflow: hidden;
      text-align: left;
      color: var(--ink);
      background: var(--ios-fill-quaternary);
      border: .5px solid var(--ios-hairline);
      border-radius: var(--radius-group);
      cursor: pointer;
      box-shadow: none;
      -webkit-backdrop-filter: blur(22px) saturate(1.14);
      backdrop-filter: blur(22px) saturate(1.14);
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }
    .news-card:active {
      transform: scale(.97);
      background: var(--ios-fill-tertiary);
    }
    .news-main {
      position: relative;
      z-index: 1;
      display: block;
      padding: 0;
    }
    .news-card.has-image .news-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 104px;
      gap: 12px;
      align-items: center;
      min-height: 88px;
    }
    .news-text {
      min-width: 0;
    }
    .news-thumb {
      width: 104px;
      height: 88px;
      display: block;
      justify-self: end;
      object-fit: cover;
      border-radius: 18px;
      background: var(--ios-fill-quaternary);
    }
    .news-card h3 {
      margin: 0;
      color: #fff;
      font-size: 17px;
      line-height: 1.24;
      font-weight: 700;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
    .source-note {
      display: block;
      margin: 8px 0 0;
      color: var(--ios-label-secondary);
      font-size: 12px;
      font-weight: 560;
      line-height: 1.35;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(0,0,0,.38);
      -webkit-backdrop-filter: blur(18px) saturate(1.08);
      backdrop-filter: blur(18px) saturate(1.08);
    }
    .modal-backdrop.open { display: flex; }
    .modal-panel {
      position: relative;
      width: min(var(--page-max), 100%);
      height: calc(100dvh - 70px);
      max-height: calc(100dvh - 70px);
      overflow: auto;
      border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
      background: rgba(21, 21, 23, .84);
      border: .5px solid var(--ios-hairline);
      border-bottom: 0;
      box-shadow: 0 -16px 44px rgba(0,0,0,.24);
      -webkit-backdrop-filter: blur(28px) saturate(1.22);
      backdrop-filter: blur(28px) saturate(1.22);
    }
    .modal-panel::after {
      content: none;
    }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 3;
      min-height: 70px;
      padding: 26px 72px 16px 20px;
      border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
      background: rgba(21, 21, 23, .72);
      -webkit-backdrop-filter: blur(24px) saturate(1.16);
      backdrop-filter: blur(24px) saturate(1.16);
    }
    .modal-grabber {
      position: absolute;
      left: 50%;
      top: 9px;
      width: 52px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(235,235,245,.30);
    }
    .modal-hero {
      position: relative;
      z-index: 1;
      margin: 8px 20px 0;
      height: 196px;
      overflow: hidden;
      border-radius: 18px;
      background: var(--ios-background-secondary);
    }
    .modal-hero.no-image {
      display: none;
    }
    .modal-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal-hero.no-image img {
      display: none;
    }
    .modal-close {
      position: absolute;
      right: 18px;
      top: 25px;
      width: var(--control-size);
      height: var(--control-size);
      border: .75px solid var(--ios-toolbar-glass-stroke);
      border-radius: 50%;
      background: var(--ios-toolbar-glass-fill);
      color: #fff;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      box-shadow: none;
      -webkit-backdrop-filter: blur(24px) saturate(1.25);
      backdrop-filter: blur(24px) saturate(1.25);
    }
    .modal-close:focus {
      outline: none;
    }
    .modal-close:focus-visible {
      box-shadow: 0 0 0 2px rgba(255,255,255,.22);
    }
    .modal-body {
      position: relative;
      z-index: 1;
      padding: 22px 20px 34px;
    }
    .modal-meta {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--ios-label-secondary);
      background: transparent;
      border-radius: 0;
      border: 0;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
    }
    .modal-title {
      margin: 0;
      color: #fff;
      font-size: 22px;
      line-height: 1.18;
      font-weight: 700;
    }
    .modal-detail {
      display: grid;
      gap: 14px;
    }
    .modal-detail p {
      margin: 0;
      color: rgba(245,245,247,.88);
      font-size: 15px;
      line-height: 1.62;
      font-weight: 430;
    }
    .modal-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin: 24px auto 0;
      min-width: 118px;
      color: #050505;
      background: rgba(255,255,255,.92);
      border: 0;
      border-radius: 999px;
      padding: 0 20px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      box-shadow: none;
      -webkit-backdrop-filter: blur(22px) saturate(1.24);
      backdrop-filter: blur(22px) saturate(1.24);
    }
    footer {
      color: var(--muted-2);
      text-align: center;
      font-size: 12px;
      padding: 26px 12px 0;
    }
    @media (min-width: 520px) {
      body {
        width: var(--page-max);
        min-width: var(--page-max);
        margin: 0 auto;
        overflow-x: hidden;
      }
      .page { width: 100%; }
      .modal-backdrop {
        width: var(--page-max);
        left: 50%;
        right: auto;
        transform: translateX(-50%);
      }
      .modal-panel { width: 100%; }
    }
    @media (max-width: 374px) {
      .brand-mark { font-size: 21px; }
      .page { padding-left: 16px; padding-right: 16px; }
      .cover-media { height: 224px; }
      .cover-info { grid-template-columns: 1fr 40px; }
      .play-button { width: 40px; height: 40px; }
      .news-card h3 { font-size: 16.5px; }
      .news-card.has-image .news-main {
        grid-template-columns: minmax(0, 1fr) 96px;
        gap: 11px;
        min-height: 84px;
      }
      .news-thumb {
        width: 96px;
        height: 84px;
        border-radius: 15px;
      }
      .mini-player {
        width: calc(100vw - 20px);
        border-radius: 22px;
      }
      .mini-player-main {
        grid-template-columns: 44px minmax(0, 1fr) 42px;
        gap: 10px;
        padding-left: 10px;
        padding-right: 10px;
      }
      .mini-art,
      .mini-toggle {
        width: 42px;
        height: 42px;
      }
      .modal-title { font-size: 21px; }
      .modal-detail p { font-size: 14.5px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="app-head">
      <div class="brand">
        <div class="brand-mark">Rainford Daily</div>
        <div class="brand-sub">2026-06-20 · 周六 · 早上 8:00</div>
      </div>
    </header>

    <section class="cover-card" id="top" aria-label="博客主卡">
      <div class="cover-media">
        <img id="coverImage" src="assets/news-source-G1-2026-06-20.jpg" alt="AP G7 原文配图">
      </div>
      <div class="cover-info">
        <div>
          <h1 class="cover-title">Rainford 早间完整播报</h1>
          <p class="cover-time">06-20 · 11:35</p>
        </div>
        <button class="play-button" id="playButton" type="button" aria-label="播放完整早间播报"></button>
      </div>
    </section>
    <audio class="hidden-audio" id="briefAudio" preload="metadata" src="assets/rainford-brief-2026-06-20-morning-broadcast.mp3"></audio>

    <section id="news" aria-label="新闻列表">
      <div class="section-title">
        <h2>今日新闻</h2>
      </div>
      <div class="category-bar" aria-label="信息分类">
        <span>AI / 科技 3</span>
        <span>中国 / 微信 / 上海 3</span>
        <span>全球大事 2</span>
        <span>产品 / 机会 2</span>
      </div>
      <div class="news-list">
        <button class="news-card" type="button" data-news-id="A3">
          <div class="news-main">
            <div class="news-text">
              <h3>DeepMind AI Control Roadmap</h3>
              <p class="source-note">来源：Axios｜Google DeepMind</p>
            </div>
          </div>
        </button>

        <button class="news-card" type="button" data-news-id="C2">
          <div class="news-main">
            <div class="news-text">
              <h3>微信开放 AI 生态接入</h3>
              <p class="source-note">来源：界面｜东方财富｜智东西｜i黑马</p>
            </div>
          </div>
        </button>

        <button class="news-card" type="button" data-news-id="C1">
          <div class="news-main">
            <div class="news-text">
              <h3>八部门发布 AI+消费实施意见</h3>
              <p class="source-note">来源：新华网</p>
            </div>
          </div>
        </button>

        <button class="news-card" type="button" data-news-id="C4">
          <div class="news-main">
            <div class="news-text">
              <h3>WAIC 2026 将在上海举行</h3>
              <p class="source-note">来源：人民网｜新浪科技｜中新社</p>
            </div>
          </div>
        </button>

        <button class="news-card has-image" type="button" data-news-id="A6">
          <div class="news-main">
            <div class="news-text">
              <h3>NewCore 做 AI Agent 身份</h3>
              <p class="source-note">来源：TechCrunch</p>
            </div>
            <img class="news-thumb" src="assets/news-source-A6-2026-06-20.webp" alt="">
          </div>
        </button>

        <button class="news-card has-image" type="button" data-news-id="G3">
          <div class="news-main">
            <div class="news-text">
              <h3>英国拟限制未成年人社交媒体</h3>
              <p class="source-note">来源：AP</p>
            </div>
            <img class="news-thumb" src="assets/news-source-G3-2026-06-20.jpg" alt="">
          </div>
        </button>

        <button class="news-card" type="button" data-news-id="A1">
          <div class="news-main">

    const audio = document.getElementById("briefAudio");

    const coverImage = document.getElementById("coverImage");
    const miniPlayer = document.getElementById("miniPlayer");
    const miniToggle = document.getElementById("miniToggle");

    let playerHasStarted = false;

    function clampChannel(value) {
      return Math.max(0, Math.min(255, Math.round(value)));
    }

    function mixColor(color, target, amount) {
      return color.map((channel, index) => clampChannel(channel * (1 - amount) + target[index] * amount));
    }

    function chooseCoverTint(image) {
      try {
        const canvas = document.createElement("canvas");
        const size = 56;
        canvas.width = size;
        canvas.height = size;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        if (!context) return;
        context.drawImage(image, 0, 0, size, size);
        const pixels = context.getImageData(0, 0, size, size).data;
        const buckets = new Map();
        for (let i = 0; i < pixels.length; i += 16) {
          const r = pixels[i];
          const g = pixels[i + 1];
          const b = pixels[i + 2];
          const a = pixels[i + 3];
          if (a < 200) continue;
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const saturation = max === 0 ? 0 : (max - min) / max;
          const lightness = (max + min) / 510;
          if (lightness > .86 || lightness < .08 || saturation < .08) continue;
          const key = `${Math.round(r / 24) * 24},${Math.round(g / 24) * 24},${Math.round(b / 24) * 24}`;
          buckets.set(key, (buckets.get(key) || 0) + 1 + saturation * 2);
        }
        const dominant = [...buckets.entries()].sort((a, b) => b[1] - a[1])[0]?.[0];
        if (!dominant) return;
        const rgb = dominant.split(",").map(Number);
        const deep = mixColor(rgb, [2, 2, 4], .58);
        const soft = mixColor(rgb, [18, 18, 22], .36);
        document.documentElement.style.setProperty("--cover-panel-rgb", deep.join(", "));
        document.documentElement.style.setProperty("--cover-panel-soft-rgb", soft.join(", "));
      } catch {
        document.documentElement.style.setProperty("--cover-panel-rgb", "24, 28, 44");
        document.documentElement.style.setProperty("--cover-panel-soft-rgb", "43, 49, 70");
      }
    }

    if (coverImage.complete) {
      chooseCoverTint(coverImage);
    } else {
      coverImage.addEventListener("load", () => chooseCoverTint(coverImage), { once: true });
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return "0:00";
      const minutes = Math.floor(seconds / 60);
      const remaining = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${minutes}:${remaining}`;
    }

    async function toggleAudio() {
      if (audio.paused) {
        await audio.play();
      } else {
        audio.pause();
      }
    }

    function updatePlayerState() {
      const isPlaying = !audio.paused && !audio.ended;
      const duration = Number.isFinite(audio.duration) ? audio.duration : 0;
      const progress = duration > 0 ? Math.min(100, Math.max(0, (audio.currentTime / duration) * 100)) : 0;
      const shouldShow = playerHasStarted && !audio.ended;

      playButton.classList.toggle("playing", isPlaying);
      miniToggle.classList.toggle("playing", isPlaying);
      document.body.classList.toggle("player-visible", shouldShow);
      miniPlayer.setAttribute("aria-hidden", shouldShow ? "false" : "true");
      miniProgress.style.width = `${progress}%`;

      if (isPlaying) {
        miniMeta.textContent = `${formatTime(audio.currentTime)} / ${formatTime(duration)}`;
      } else if (shouldShow) {
        miniMeta.textContent = `已暂停 · ${formatTime(audio.currentTime)} / ${formatTime(duration)}`;
      } else {
        miniMeta.textContent = "准备播放";
      }
    }

    playButton.addEventListener("click", toggleAudio);
    miniToggle.addEventListener("click", toggleAudio);
    audio.addEventListener("loadedmetadata", updatePlayerState);
    audio.addEventListener("timeupdate", updatePlayerState);
    audio.addEventListener("play", () => {
      playerHasStarted = true;
      updatePlayerState();
    });
    audio.addEventListener("pause", updatePlayerState);
    audio.addEventListener("ended", () => {
      playerHasStarted = false;
      audio.currentTime = 0;
      updatePlayerState();
    });

    if (new URLSearchParams(window.location.search).get("player") === "preview") {
      playerHasStarted = true;
      miniMeta.textContent = "0:37 / 11:35";
      miniProgress.style.width = "5%";
      document.body.classList.add("player-visible");
      miniPlayer.setAttribute("aria-hidden", "false");
    }

    const modal = document.getElementById("newsModal");
    const closeButton = document.getElementById("modalClose");
    const modalHero = document.querySelector(".modal-hero");
    const modalImage = document.getElementById("modalImage");
    const modalTitle = document.getElementById("modalTitle");
    const modalMeta = document.getElementById("modalMeta");
    const modalDetail = document.getElementById("modalDetail");
    const modalLink = document.getElementById("modalLink");
    const pageRoot = document.querySelector(".page");
    let lastFocusedCard = null;

    function detailParagraphs(item) {
      const paragraphs = [
        item.essence || item.summary,
        item.summary && item.summary !== item.essence ? item.summary : "",
        item.what,
        ...(item.points || []),
        item.why
      ].filter(Boolean);
      return [...new Set(paragraphs)].slice(0, 6);
    }

    function openModal(id, trigger) {
      const item = newsData[id];
      if (!item) return;
      lastFocusedCard = trigger;
      if (item.image) {
        modalHero.classList.remove("no-image");
        modalImage.src = item.image;
        modalImage.alt = `${item.title} 来源图片`;
      } else {
        modalHero.classList.add("no-image");
        modalImage.removeAttribute("src");
        modalImage.alt = "";
      }
      modalTitle.textContent = item.title;
      modalMeta.textContent = item.meta;
      modalDetail.replaceChildren();
      detailParagraphs(item).forEach((text) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = text;
        modalDetail.appendChild(paragraph);
      });
      modalLink.href = item.url;
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
      document.body.style.overflow = "hidden";
      pageRoot.setAttribute("aria-hidden", "true");
      pageRoot.inert = true;
    }

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");
      document.body.style.overflow = "";
      pageRoot.removeAttribute("aria-hidden");
      pageRoot.inert = false;
      if (lastFocusedCard) lastFocusedCard.focus();
    }

    document.querySelectorAll("[data-news-id]").forEach((card) => {
      card.addEventListener("click", () => openModal(card.dataset.newsId, card));
    });
    const initialNewsId = new URLSearchParams(window.location.search).get("news");
    if (initialNewsId && newsData[initialNewsId]) {
      const initialCard = document.querySelector(`[data-news-id="${initialNewsId}"]`);
      requestAnimationFrame(() => openModal(initialNewsId, initialCard));
    }
    closeButton.addEventListener("click", closeModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("open")) closeModal();
    });
  </script>
</body>
</html>
